<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTOMAX — Usados</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/inventario.css" />
</head>
<body>
  <main id="main-content">
    <div class="page-bar">
      <span class="page-bar-num">03</span>
      <span class="page-bar-divider"></span>
      <h2 class="page-bar-title" data-i18n="sec_usados">Vehículos Usados</h2>
    </div>
    <section class="section section--dark">
      <div class="toolbar">
        <div class="search-wrapper"><i data-lucide="search" class="search-icon"></i><input type="text" id="search-input" class="search-input" data-i18n="ph_buscar" placeholder="Buscar vehículo..." oninput="filtrarVehiculos()" /></div>
        <button class="toolbar-btn" id="btn-toggle-filters" onclick="toggleFilterPanel()"><i data-lucide="sliders-horizontal"></i> <span data-i18n="lbl_filtrar">Filtrar</span></button>
        <button class="toolbar-btn" onclick="generarPDFInventario()"><i data-lucide="file-down"></i> <span data-i18n="lbl_pdf">PDF</span></button>
        <div class="view-toggle">
          <button id="view-table" class="view-btn active" onclick="setView('table')" title="Vista tabla"><i data-lucide="list"></i></button>
          <button id="view-cards" class="view-btn" onclick="setView('cards')" title="Vista tarjetas"><i data-lucide="layout-grid"></i></button>
        </div>
      </div>
      <div class="filter-drawer" id="filter-drawer">
        <div class="filter-drawer-panel">
          <div class="filter-drawer-body">
            <div class="filter-drawer-section">
              <span class="filter-drawer-label" data-i18n="th_suc">Sucursal</span>
              <div id="sucursal-filter-dropdown" class="custom-select custom-select--toolbar">
                <button class="custom-select-trigger" type="button" aria-expanded="false"><span class="custom-select-value" data-i18n="opt_todas_suc">Todas las sucursales</span><span class="custom-select-icon"></span></button>
                <ul class="custom-select-options" role="listbox"></ul>
              </div>
              <select id="sucursal-filter-select" style="display:none"></select>
            </div>
            <div class="filter-drawer-divider"></div>
            <div class="filter-drawer-section">
              <span class="filter-drawer-label" data-i18n="th_trans">Transmisión</span>
              <div class="filter-group" id="filter-group-transmision">
              <button class="filter-btn active" data-filter="all" onclick="filterByTransmision('all')"><span data-i18n="filter_all">Todas</span></button>
              <button class="filter-btn" data-filter="Automática" onclick="filterByTransmision('Automática')"><span data-i18n="opt_auto">Automática</span></button>
              <button class="filter-btn" data-filter="Manual" onclick="filterByTransmision('Manual')"><span data-i18n="opt_manual">Manual</span></button>
              <button class="filter-btn" data-filter="CVT" onclick="filterByTransmision('CVT')">CVT</button>
              </div>
            </div>
            <div class="filter-drawer-divider"></div>
            <div class="filter-drawer-section">
              <span class="filter-drawer-label" data-i18n="th_comb">Combustible</span>
              <div class="filter-group" id="filter-group-combustible">
                <button class="filter-btn active" data-filter="all" onclick="filterByFuel('all')"><span data-i18n="filter_all">Todos</span></button>
                <button class="filter-btn" data-filter="Gasolina" onclick="filterByFuel('Gasolina')"><span data-i18n="filter_gas">Gasolina</span></button>
                <button class="filter-btn" data-filter="Diésel" onclick="filterByFuel('Diésel')"><span data-i18n="filter_diesel">Diésel</span></button>
                <button class="filter-btn" data-filter="Eléctrico" onclick="filterByFuel('Eléctrico')"><span data-i18n="filter_electric">Eléctrico</span></button>
                <button class="filter-btn" data-filter="Híbrido" onclick="filterByFuel('Híbrido')"><span data-i18n="filter_hybrid">Híbrido</span></button>
              </div>
            </div>
            <div class="filter-drawer-divider"></div>
            <div class="filter-drawer-section">
              <span class="filter-drawer-label" data-i18n="lbl_anio">Año</span>
              <div class="year-group">
                <div id="year-from-dropdown" class="custom-select custom-select--toolbar custom-select--compact">
                  <button class="custom-select-trigger" type="button" aria-expanded="false"><span class="custom-select-value"><span data-i18n="lbl_desde">Desde</span></span><span class="custom-select-icon"><i data-lucide="chevron-down" class="custom-select-arrow"></i></span></button>
                  <ul class="custom-select-options" role="listbox"></ul>
                  <select id="year-from-select" style="display:none"></select>
                </div>
                <span class="year-sep">—</span>
                <div id="year-to-dropdown" class="custom-select custom-select--toolbar custom-select--compact">
                  <button class="custom-select-trigger" type="button" aria-expanded="false"><span class="custom-select-value"><span data-i18n="lbl_hasta">Hasta</span></span><span class="custom-select-icon"><i data-lucide="chevron-down" class="custom-select-arrow"></i></span></button>
                  <ul class="custom-select-options" role="listbox"></ul>
                  <select id="year-to-select" style="display:none"></select>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="table-wrapper" id="table-wrapper">
        <table class="vehicle-table">
          <thead><tr><th data-i18n="th_img">Imagen</th><th data-i18n="th_cod">Código</th><th data-i18n="th_marca">Marca</th><th data-i18n="th_mod">Modelo</th><th data-i18n="th_anio">Año</th><th data-i18n="th_color">Color</th><th data-i18n="th_comb">Combustible</th><th data-i18n="th_trans">Transmisión</th><th data-i18n="th_cond">Condición</th><th data-i18n="th_suc">Sucursal</th><th data-i18n="th_precio">Precio</th><th data-i18n="th_cant">Cantidad</th><th data-i18n="th_acciones">Acciones</th></tr></thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
      <div id="cards-wrapper" class="vehicle-grid" style="display:none"></div>
      <div id="empty-state" class="empty-state" style="display:none">
        <span class="empty-number">0</span>
        <p class="empty-title" data-i18n="empty_title_used">No se encontraron vehículos usados</p>
        <p class="empty-sub" data-i18n="empty_sub_used">Intenta ajustar los filtros.</p>
      </div>
    </section>
  </main>
</body>
</html>
